<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بلدية هيت - النظام المتقدم</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<style>
  body { font-family: Arial, sans-serif; background-color:#ffffff; margin:0; padding:0; }
  header { background-color:#f9d342; padding:15px; text-align:center; color:#0b4f2a; }
  nav a { margin:0 10px; color:#0b4f2a; text-decoration:none; font-weight:bold; }
  main { padding:20px; }
  section { margin-bottom:30px; }
  h2 { color:#0b4f2a; }
  .form-group input, .form-group textarea { width:100%; padding:10px; margin:5px 0; }
  .form-group button { background-color:#f9d342; color:#0b4f2a; border:none; padding:10px 20px; cursor:pointer; font-weight:bold; }
  #map { height:500px; width:100%; border:2px solid #0b4f2a; margin-top:20px; }
  footer { background-color:#0b4f2a; color:white; text-align:center; padding:10px; }
  .hidden { display:none; }
</style>
</head>
<body>
<header>
  <h1>بلدية هيت</h1>
  <nav>
    <a href="#social">وسائل التواصل</a>
    <a href="#complaints">الشكاوى</a>
    <a href="#map-section">الخريطة</a>
    <a href="#admin-section">إدارة الآليات</a>
  </nav>
</header>

<main>
  <!-- وسائل التواصل -->
  <section id="social">
    <h2>تابعنا على وسائل التواصل الاجتماعي</h2>
    <p>
      <a href="#" target="_blank">فيسبوك</a> |
      <a href="#" target="_blank">تويتر</a> |
      <a href="#" target="_blank">انستغرام</a> |
      <a href="#" target="_blank">يوتيوب</a>
    </p>
  </section>

  <!-- الشكاوى -->
  <section id="complaints">
    <h2>أرسل شكواك أو ملاحظتك</h2>
    <form id="complaintForm" class="form-group">
      <input type="text" placeholder="اسمك" required>
      <input type="email" placeholder="البريد الإلكتروني" required>
      <textarea placeholder="اكتب شكواك هنا..." rows="4" required></textarea>
      <input type="file" accept="image/*">
      <input type="text" placeholder="إحداثيات GPS (مثال: 33.425,43.295)">
      <button type="submit">إرسال الشكوى</button>
    </form>
    <p id="complaintMessage"></p>
  </section>

  <!-- الخريطة -->
  <section id="map-section">
    <h2>خريطة مدينة هيت</h2>
    <div id="map"></div>
  </section>

  <!-- إدارة الآليات للمستخدم الأساسي -->
  <section id="admin-section">
    <h2>إدارة الآليات (للمستخدمين الأساسيين)</h2>
    <form id="vehicleForm" class="form-group">
      <input type="text" placeholder="اسم الآلية" required>
      <input type="text" placeholder="إحداثيات GPS (مثال: 33.425,43.295)" required>
      <input type="text" placeholder="الـ Tag الخاص بالآلية" required>
      <button type="submit">إضافة الآلية</button>
    </form>
    <ul id="vehicleList"></ul>
  </section>
</main>

<footer>
  جميع الحقوق محفوظة © بلدية هيت
</footer>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
  // إعداد الخريطة
  const map = L.map('map').setView([33.425, 43.295], 13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(map);

  // بيانات مؤقتة للآليات
  let vehicles = [];

  // التعامل مع إضافة الآليات
  const vehicleForm = document.getElementById('vehicleForm');
  const vehicleList = document.getElementById('vehicleList');

  vehicleForm.addEventListener('submit', function(e){
    e.preventDefault();
    const name = this[0].value;
    const gps = this[1].value.split(',');
    const tag = this[2].value;
    const marker = L.marker([parseFloat(gps[0]), parseFloat(gps[1])]).addTo(map)
      .bindPopup(`آلية البلدية: ${name} (Tag: ${tag})`);
    vehicles.push({name, gps, tag, marker});
    const li = document.createElement('li');
    li.textContent = `الآلية: ${name}, Tag: ${tag}, GPS: ${gps}`;
    vehicleList.appendChild(li);
    this.reset();
  });

  // التعامل مع الشكاوى (تخزين مؤقت)
  const complaintForm = document.getElementById('complaintForm');
  const complaintMessage = document.getElementById('complaintMessage');
  complaintForm.addEventListener('submit', function(e){
    e.preventDefault();
    // في النسخة الفعلية يمكن رفع البيانات إلى قاعدة بيانات
    complaintMessage.textContent = "تم استلام شكواك بنجاح. شكرًا لتعاونك!";
    this.reset();
  });
</script>
</body>
</html>
